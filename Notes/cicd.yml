
name: CI/CD → Docker + GitOps + SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/bankapp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      # STEP 1: Checkout code
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # STEP 2: Setup Java 17
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # STEP 3: Compile & Run Tests
      - name: Compile & Test
        run: |
          mvn compile
          mvn test

      # STEP 4: Trivy FS Scan (Optional security scan)
      - name: Trivy FS Scan
        run: |
          wget https://github.com/aquasecurity/trivy/releases/download/v0.46.0/trivy_0.46.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.46.0_Linux-64bit.deb
          trivy fs --format table -o fs.html .

      # STEP 5: SonarCloud Analysis + Quality Gate (easy)
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            mvn clean compile test sonar:sonar
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.java.binaries=target/classes
            -Dsonar.qualitygate.wait=true

      # STEP 6: Setup Docker Buildx
      - uses: docker/setup-buildx-action@v3

      # STEP 7: Login to Docker Hub
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # STEP 8: Generate short SHA tag
      - id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT

      # STEP 9: Build & Push Docker Image
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # STEP 1: Checkout CD repo
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # STEP 2: Update deployment.yaml with new image tag
      - run: |
          IMAGE_LINE="image: ${{ env.IMAGE_NAME }}:.*"
          NEW_IMAGE="image: ${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
          sed -i "s|$IMAGE_LINE|$NEW_IMAGE|" k8s/deployment.yaml

      # STEP 3: Commit & push changes
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update image to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
            git pull --rebase origin main
            git push origin main

      # STEP 4: Optional rollout (uncomment if kubectl access)
      - run: |
          echo "Optional: uncomment below if cluster access is available"
