# =========================================================
# Namespace: used to isolate resources (dev/staging/prod)
# =========================================================
apiVersion: v1
kind: Namespace
metadata:
  name: bankapp-ns

---
# =========================================================
# Secret: store sensitive data (base64 encoded)
# NOTE: never store plain passwords in real projects
# command: echo -n "Test@123" | base64 
# =========================================================
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: bankapp-ns
type: Opaque
data:
  MYSQL_ROOT_PASSWORD: VGVzdEAxMjM=

---
# =========================================================
# ConfigMap: store non-sensitive configuration
# =========================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: bankapp-ns
data:
  MYSQL_DATABASE: bankappdb

---
# =========================================================
# PersistentVolumeClaim:
# Requests storage from cluster (dynamic provisioning)
# PV will be created automatically by StorageClass
# =========================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: bankapp-ns
spec:
  accessModes:
    - ReadWriteOnce            # only one pod can use it
  resources:
    requests:
      storage: 5Gi             # requested storage size

---

# MySQL Deployment:
# Runs MySQL container with persistent storage
# =========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: bankapp-ns
spec:
  selector:
    matchLabels:
      app: mysql

  # Important for DB: ensures only one pod runs at a time
  strategy:
    type: Recreate

  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8

        # MySQL default port
        ports:
        - containerPort: 3306

        # Load sensitive data from Secret
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD

        # Load DB name from ConfigMap
        - name: MYSQL_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mysql-config
              key: MYSQL_DATABASE

        # Mount persistent volume (data will not be lost)
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql

      # Attach PVC to the pod
      volumes:
      - name: mysql-data
        persistentVolumeClaim:
          claimName: mysql-pvc

---

# MySQL Service:
# =========================================================
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: bankapp-ns
spec:
  ports:
  - port: 3306                 # service port
  selector:
    app: mysql                 # route traffic to mysql pods

---
# =========================================================
# BankApp Deployment (Spring Boot Application)
# =========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bankapp
  namespace: bankapp-ns
spec:
  replicas: 1                  # number of app pods

  selector:
    matchLabels:
      app: bankapp

  template:
    metadata:
      labels:
        app: bankapp
    spec:
      containers:
      - name: bankapp
        image: adijaiswal/bankapp:latest

        # Application runs on port 8080
        ports:
        - containerPort: 8080

        # Database connection configuration
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:mysql://mysql-service:3306/bankappdb

        - name: SPRING_DATASOURCE_USERNAME
          value: root

        # Password from Secret (secure)
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD

---
# BankApp Service:
# =========================================================
apiVersion: v1
kind: Service
metadata:
  name: bankapp-service
  namespace: bankapp-ns
spec:
  type: LoadBalancer           # external access
  ports:
  - port: 80                   # public port
    targetPort: 8080           # container port
  selector:
    app: bankapp