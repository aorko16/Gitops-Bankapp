# =========================================================
# Namespace: isolate all resources
# =========================================================
apiVersion: v1
kind: Namespace
metadata:
  name: bankapp-ns
---

# =========================================================
# Secret: sensitive data (auto base64 encoded)
# =========================================================
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: bankapp-ns
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: Test@123
---

# =========================================================
# ConfigMap: non-sensitive config
# =========================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: bankapp-ns
data:
  MYSQL_DATABASE: "bankappdb"
---

# =========================================================
# Headless Service (REQUIRED for StatefulSet)
# - Gives stable DNS (mysql-0.mysql, etc.)
# =========================================================
apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
  namespace: bankapp-ns
spec:
  clusterIP: None   # Headless service
  ports:
  - port: 3306
    targetPort: 3306
  selector:
    app: mysql
---

# =========================================================
# MySQL StatefulSet (Production Best Practice)
# =========================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: bankapp-ns
spec:
  serviceName: mysql-headless   # must match headless service
  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8

        # Resource control (production)
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1"

        ports:
        - containerPort: 3306

        # Environment variables
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD

        - name: MYSQL_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mysql-config
              key: MYSQL_DATABASE

        # Persistent storage mount
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql

  # Dynamic PVC creation (per pod)
  volumeClaimTemplates:
  - metadata:
      name: mysql-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi

---
# =========================================================
# MySQL ClusterIP Service (for app connection)
# =========================================================
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: bankapp-ns
spec:
  type: ClusterIP
  ports:
  - port: 3306
    targetPort: 3306
  selector:
    app: mysql
---


# =========================================================
# BankApp Deployment (Stateless App)
# =========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bankapp
  namespace: bankapp-ns
spec:
  replicas: 2

  selector:
    matchLabels:
      app: bankapp

  template:
    metadata:
      labels:
        app: bankapp
    spec:
      containers:
      - name: bankapp
        image: adijaiswal/bankapp:latest

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        ports:
        - containerPort: 8080

        # DB Connection
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:mysql://mysql-service:3306/bankappdb

        - name: SPRING_DATASOURCE_USERNAME
          value: root

        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD

---
# =========================================================
# BankApp Service (Expose outside cluster)
# =========================================================
apiVersion: v1
kind: Service
metadata:
  name: bankapp-service
  namespace: bankapp-ns
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 31111
  selector:
    app: bankapp