name: CI/CD → Docker + GitOps + SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/bankapp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      # ------------------ Checkout ------------------
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------ Setup Java ------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ------------------ Build + SonarCloud Scan ------------------
      - name: Build + SonarCloud Scan
        working-directory: Multi-Tier-BankApp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.organization=aorko16 \
            -Dsonar.projectKey=Gitops-BankappProject \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.branch.name=${GITHUB_REF_NAME}

      # ------------------ Optional: Quality Gate ------------------
      - name: SonarCloud Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master

      # ------------------ Upload Test Reports ------------------
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-test-reports
          path: Multi-Tier-BankApp/target/surefire-reports/

      # ------------------ Trivy Filesystem Scan ------------------
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'trivy-report.txt'

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-report.txt

      # ------------------ Setup Docker Buildx ------------------
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------ Docker Login ------------------
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ------------------ Generate Image Tag ------------------
      - name: Generate Tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT

      # ------------------ Build & Push Docker Image ------------------
      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: Multi-Tier-BankApp
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest

  update-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # ------------------ Checkout Repo ------------------
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      # ------------------ Update Deployment YAML ------------------
      - name: Update Deployment YAML
        run: |
          IMAGE_LINE="image: ${{ env.IMAGE_NAME }}:.*"
          NEW_IMAGE="image: ${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
          sed -i "s|$IMAGE_LINE|$NEW_IMAGE|" k8s/deployment.yaml

      # ------------------ Commit Changes ------------------
      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update image to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
